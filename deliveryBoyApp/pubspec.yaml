name: active_flutter_delivery_app
description: "A new Flutter project."
publish_to: 'none'
version: 4.4.0+1
environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.0.1
  connectivity_plus: ^7.0.0
  shimmer: ^3.0.0
  url_launcher: ^6.0.17
  shared_preferences: ^2.3.3
  webview_flutter: ^4.2.0
  intl_phone_number_input: ^0.7.0+2
  cached_network_image: ^3.2.0
  timeline_tile: ^2.0.0
  shared_value: ^3.0.0
  rename: ^3.0.2
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  one_context: ^4.1.0
  package_info_plus: ^9.0.0
  flutter_lints: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.1.5
  json_serializable: ^6.1.0
  flutter_launcher_icons: ^0.14.1
  google_maps_flutter: ^2.1.1
  route_transitions: ^2.0.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
flutter_gen:
  output: lib/gen/
  synthetic-package: false    
